[env]
TERM = "xterm-256color"

[keyboard]
bindings = [
  { key = "N", mods = "Control|Shift", action = "SpawnNewInstance" },
  { key = "Left",  mods = "Alt", chars = "\u001bb" },
  { key = "Right", mods = "Alt", chars = "\u001bf" }
]

[font]
size = 20

[font.normal]
family = "FiraCode Nerd Font Mono"
style = "SemiBold"

[font.bold]
family = "FiraCode Nerd Font Mono"
style = "Bold"

[font.italic]
family = "FiraCode Nerd Font Mono"
style = "Medium"

[window]
dimensions = { columns = 80, lines = 26 }
